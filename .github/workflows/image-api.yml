name: image-api
# The portal-api image (the launchpad registry), built from ./server. Folded
# into this repo but published as its own image the demo pulls.
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  image-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/zaentrum/portal-api:latest
            ghcr.io/zaentrum/portal-api:${{ github.sha }}

# zaentrum-portal CI — build the SPA + push an image. Dormant unless CI_ENABLED=true.
# Deploy is handled by the demo overlay (infrastructure/zaentrum-demo), not here.
workflow:
  rules:
    - if: $CI_ENABLED == "true"
      when: always
    - when: never

stages:
  - build
  - containerize

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE

build:
  stage: build
  image: registry.nalet.cloud/infrastructure/library/node:22-alpine
  script:
    - npm ci --no-audit --no-fund
    - npm run build
  artifacts:
    paths: [dist/]
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

containerize:
  stage: containerize
  image:
    name: registry.nalet.cloud/infrastructure/library/kaniko-project/executor:debug
    entrypoint: [""]
  needs: ["build"]
  script:
    - mkdir -p "$DOCKER_CONFIG"
    - REGISTRY_AUTH="$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"
    - printf '{"auths":{"%s":{"auth":"%s"}}}' "$CI_REGISTRY" "$REGISTRY_AUTH" > "$DOCKER_CONFIG/config.json"
    # immutable sha always; :latest only on the default branch
    - DESTS="--destination $IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then DESTS="$DESTS --destination $IMAGE_NAME:latest"; fi
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile $DESTS --push-retry=5
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

server {
  listen 8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # bare host -> launchpad
  location = / { return 302 /portal/; }

  # SPA under /portal/ (built with Vite base=/portal/); deep links fall back to index
  location /portal/ {
    try_files $uri $uri/ /portal/index.html;
  }
  location /portal/assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}

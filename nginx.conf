server {
  listen 8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  # keep redirects relative (no internal :8080 host leak on /portal -> /portal/)
  absolute_redirect off;

  # bare host -> launchpad
  location = / { return 302 /portal/; }

  # SPA under /portal/ (built with Vite base=/portal/); deep links fall back to index.
  # The app shell (index.html) must ALWAYS revalidate — it names the hashed asset
  # bundle, so a cached shell keeps loading the old JS after a deploy (stale UI).
  # no-cache = store but revalidate every load (cheap 304s); the hashed assets below
  # stay immutable via their own more-specific location.
  location /portal/ {
    try_files $uri $uri/ /portal/index.html;
    add_header Cache-Control "no-cache" always;
  }
  location /portal/assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
